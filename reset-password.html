<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Set New Password — IurisIQ Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="login-page">

  <div class="login-container" role="main">
    <div class="login-card">

      <header class="login-header">
        <img src="assets/iurisiq-logo.png" class="login-logo" alt="IurisIQ">
        <p class="login-subtitle">Client &amp; Staff Portal</p>
      </header>

      <!-- Verifying state (shown while Supabase exchanges the token) -->
      <div id="loading-state" class="login-form">
        <p class="reset-intro" style="text-align:center;">Verifying reset link…</p>
      </div>

      <!-- Set new password form (shown after PASSWORD_RECOVERY event) -->
      <form id="reset-form" class="login-form" hidden novalidate>
        <p class="reset-intro">Enter a new password for your account.</p>
        <div class="field">
          <label for="new-password">New password</label>
          <input type="password" id="new-password" autocomplete="new-password" minlength="8">
          <span class="text-muted text-sm">Min 8 characters — must include uppercase, lowercase, number, and special character.</span>
        </div>
        <div class="field">
          <label for="confirm-password">Confirm new password</label>
          <input type="password" id="confirm-password" autocomplete="new-password" minlength="8">
        </div>
        <div id="reset-error"   class="form-error"   role="alert"  hidden></div>
        <div id="reset-success" class="form-success"  role="status" hidden></div>
        <button type="submit" id="reset-btn" class="btn btn--primary btn--full">Update password</button>
      </form>

      <!-- Invalid / expired link -->
      <div id="error-state" class="login-form" hidden>
        <p class="form-error" style="display:block; margin-bottom:1rem;">
          This reset link is invalid or has expired. Please request a new one.
        </p>
        <a href="/" class="btn btn--primary btn--full" style="text-align:center;">Back to sign in</a>
      </div>

    </div>
  </div>

  <div class="powered-by">
    <img src="IurisIQ-Logo-removebg-preview.png" alt="IurisIQ">
    <span>Powered by IurisIQ</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    (async function () {
      const loadingEl  = document.getElementById('loading-state');
      const resetForm  = document.getElementById('reset-form');
      const errorState = document.getElementById('error-state');
      const resetErr   = document.getElementById('reset-error');
      const resetOk    = document.getElementById('reset-success');
      const resetBtn   = document.getElementById('reset-btn');
      const newPwEl    = document.getElementById('new-password');
      const confirmEl  = document.getElementById('confirm-password');

      // Capture hash params before Supabase clears them.
      const hashParams = new URLSearchParams(window.location.hash.slice(1));
      const isInvite   = hashParams.get('type') === 'invite';

      if (isInvite) {
        document.title = 'Welcome — Set Your Password';
        document.querySelector('.reset-intro').textContent =
          'Welcome! Please set a password to access your portal.';
        resetBtn.textContent = 'Set password & continue';
      }

      let recoveryActive = false;

      // PASSWORD_RECOVERY = password reset link; SIGNED_IN = invite link.
      // Also check SIGNED_IN for PKCE recovery flow (code= param in URL, no type in hash).
      const urlParams = new URLSearchParams(window.location.search);
      const hasPkceCode = !!urlParams.get('code');

      db.auth.onAuthStateChange((event, session) => {
        const isRecovery = event === 'PASSWORD_RECOVERY' ||
          (event === 'SIGNED_IN' && isInvite) ||
          (event === 'SIGNED_IN' && hasPkceCode && session?.user);
        if (isRecovery) {
          recoveryActive = true;
          loadingEl.hidden = true;
          errorState.hidden = true;  // hide in case timeout already showed it
          resetForm.hidden = false;
          newPwEl.focus();
        }
      });

      // Trigger the token exchange (processes hash fragment or ?code= param).
      await db.auth.getSession();

      // Fallback: show error state if no recovery event arrives within 10 s.
      // PKCE token exchange can take longer than implicit flow.
      setTimeout(() => {
        if (!recoveryActive) {
          loadingEl.hidden = true;
          errorState.hidden = false;
        }
      }, 10000);

      resetForm.addEventListener('submit', async e => {
        e.preventDefault();
        resetErr.hidden = true;
        resetOk.hidden  = true;

        const pw      = newPwEl.value;
        const confirm = confirmEl.value;

        if (pw.length < 8)               { resetErr.textContent = 'Password must be at least 8 characters.'; resetErr.hidden = false; return; }
        if (!/[A-Z]/.test(pw))           { resetErr.textContent = 'Password must include at least one uppercase letter.'; resetErr.hidden = false; return; }
        if (!/[a-z]/.test(pw))           { resetErr.textContent = 'Password must include at least one lowercase letter.'; resetErr.hidden = false; return; }
        if (!/[0-9]/.test(pw))           { resetErr.textContent = 'Password must include at least one number.'; resetErr.hidden = false; return; }
        if (!/[^A-Za-z0-9]/.test(pw))    { resetErr.textContent = 'Password must include at least one special character (e.g. !@#$%).'; resetErr.hidden = false; return; }
        if (pw !== confirm)              { resetErr.textContent = 'Passwords do not match.'; resetErr.hidden = false; return; }

        resetBtn.disabled = true;
        resetBtn.textContent = 'Updating…';

        try {
          const { error } = await db.auth.updateUser({ password: pw });
          if (error) throw error;

          resetOk.textContent = 'Password updated! Redirecting to portal…';
          resetOk.hidden = false;
          resetForm.hidden = true;

          setTimeout(() => window.location.replace('/portal'), 1500);
        } catch (err) {
          resetErr.textContent = err.message;
          resetErr.hidden = false;
          resetBtn.disabled = false;
          resetBtn.textContent = 'Update password';
        }
      });
    })();
  </script>
</body>
</html>
