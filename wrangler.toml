# IurisIQ Portal — Cloudflare Workers config — Katy Chavez deployment
name = "katychavez-portal-new"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = "./_worker.js"

[assets]
directory = "."
binding = "ASSETS"

# ── R2 native binding (required for browser file uploads) ────────────────────
# The S3-compatible API cannot be used for Worker→R2 PUTs (CF same-zone restriction).
# The native binding bypasses HTTP entirely and is the only reliable write path.
[[r2_buckets]]
binding    = "R2"
bucket_name = "katychavez-portal"

[triggers]
crons = ["0 14 * * *", "*/5 * * * *"]   # Daily 9am CST: doc reminders | Every 5 min: message notifications

