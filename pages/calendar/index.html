<!-- Calendar — loaded dynamically into #page-content by menu.js -->
<div class="page-header">
  <div>
    <h1 class="page-title">Calendar</h1>
    <p class="page-subtitle">Upcoming events from your connected calendar.</p>
  </div>
  <div style="display:flex;gap:var(--space-2)">
    <button class="btn btn--ghost btn--sm" id="cal-settings-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
    <button class="btn btn--primary" id="cal-new-event-btn" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Event
    </button>
  </div>
</div>

<!-- View tabs -->
<div id="cal-tabs" class="hidden" style="display:flex;gap:var(--space-1);margin-bottom:var(--space-4);background:var(--color-bg-subtle,#f8f9fa);border-radius:8px;padding:4px">
  <button class="cal-tab-btn btn btn--ghost btn--sm active" data-view="today"    style="flex:1">Today</button>
  <button class="cal-tab-btn btn btn--ghost btn--sm"        data-view="week"     style="flex:1">This Week</button>
  <button class="cal-tab-btn btn btn--ghost btn--sm"        data-view="month"    style="flex:1">This Month</button>
  <button class="cal-tab-btn btn btn--ghost btn--sm"        data-view="upcoming" style="flex:1">Upcoming</button>
</div>

<!-- Not-connected state -->
<div id="cal-not-connected" class="card hidden" style="text-align:center;padding:var(--space-12) var(--space-6)">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:48px;height:48px;margin:0 auto var(--space-4);color:var(--color-text-muted)">
    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
  </svg>
  <h2 style="font-size:var(--font-size-lg);font-weight:600;margin-bottom:var(--space-2)">No calendar connected</h2>
  <p class="text-muted" style="margin-bottom:var(--space-5)">Connect your Google or Outlook calendar to view and create events from the portal.</p>
  <div style="display:flex;gap:var(--space-3);justify-content:center;flex-wrap:wrap">
    <button class="btn btn--primary" id="cal-connect-google">Connect Google Calendar</button>
    <button class="btn btn--secondary" id="cal-connect-outlook">Connect Outlook Calendar</button>
  </div>
</div>

<!-- Loading state -->
<div id="cal-loading" class="card hidden" style="padding:var(--space-10);text-align:center;color:var(--color-text-muted)">
  Loading events…
</div>

<!-- Events list -->
<div id="cal-events-container" class="hidden"></div>

<!-- No events state -->
<div id="cal-no-events" class="card hidden" style="padding:var(--space-10);text-align:center;color:var(--color-text-muted)">
  <span id="cal-no-events-msg">No events found.</span>
</div>

<!-- New Event modal -->
<div id="cal-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="cal-modal-title">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h2 class="modal-title" id="cal-modal-title">New Event</h2>
      <button class="modal-close" id="cal-modal-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="cal-event-form" novalidate>
        <div class="field" style="margin-bottom:var(--space-4)">
          <label for="cal-title">Title <span class="required">*</span></label>
          <input type="text" id="cal-title" placeholder="e.g. Client meeting – Smith" required>
        </div>
        <div class="field-row" style="margin-bottom:var(--space-4)">
          <div class="field" style="flex:1">
            <label for="cal-date">Date <span class="required">*</span></label>
            <input type="date" id="cal-date" required>
          </div>
        </div>
        <div class="field-row" style="margin-bottom:var(--space-4)">
          <div class="field" style="flex:1">
            <label for="cal-start">Start time <span class="required">*</span></label>
            <input type="time" id="cal-start" required>
          </div>
          <div class="field" style="flex:1">
            <label for="cal-end">End time <span class="required">*</span></label>
            <input type="time" id="cal-end" required>
          </div>
        </div>
        <div class="field" style="margin-bottom:var(--space-4)">
          <label for="cal-location">Location</label>
          <input type="text" id="cal-location" placeholder="e.g. Courtroom 3B or Zoom link">
        </div>
        <div class="field" style="margin-bottom:var(--space-4)">
          <label for="cal-description">Description</label>
          <textarea id="cal-description" rows="3" placeholder="Optional notes…" style="resize:vertical"></textarea>
        </div>
        <div id="cal-form-error" class="form-error hidden" style="margin-bottom:var(--space-3)"></div>
        <div style="display:flex;gap:var(--space-3);justify-content:flex-end">
          <button type="button" class="btn btn--ghost" id="cal-modal-cancel">Cancel</button>
          <button type="submit" class="btn btn--primary" id="cal-save-btn">Create Event</button>
        </div>
      </form>
    </div>
  </div>
</div>
