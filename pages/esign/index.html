<!-- Module: esign — loaded dynamically into #page-content by menu.js -->
<div class="page-header">
  <div>
    <h1 class="page-title">E-Sign</h1>
    <p class="page-subtitle" id="esign-subtitle">Signature requests</p>
  </div>
</div>

<!-- ── Pending counter-signatures (attorney queue) ─────────────────────── -->
<div class="card" id="esign-countersign-card" style="margin-bottom:var(--space-5)">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4)">
    <h2 style="font-size:var(--text-md);font-weight:600;margin:0">Awaiting Your Counter-Signature</h2>
    <span id="esign-countersign-count" class="badge" style="display:none"></span>
  </div>
  <div id="esign-countersign-list"></div>
</div>

<!-- ── All requests table ──────────────────────────────────────────────── -->
<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-4)">
    <h2 style="font-size:var(--text-md);font-weight:600;margin:0">All Signature Requests</h2>
    <select id="esign-filter-status" style="font-size:var(--text-sm);padding:var(--space-2) var(--space-3);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-surface)">
      <option value="">All statuses</option>
      <option value="pending_client">Pending client</option>
      <option value="pending_attorney">Pending attorney</option>
      <option value="completed">Completed</option>
      <option value="declined">Declined</option>
      <option value="expired">Expired</option>
    </select>
  </div>
  <div style="overflow-x:auto">
    <table class="data-table">
      <thead>
        <tr>
          <th>Document</th>
          <th>Client</th>
          <th>Status</th>
          <th>Requested</th>
          <th>Expires</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="esign-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Counter-sign modal -->
<div id="esign-sign-modal" class="modal-overlay hidden" role="dialog" aria-modal="true"></div>
