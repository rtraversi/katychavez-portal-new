<!-- Settings › Permissions — role × module access matrix -->
<div class="page-header">
  <div>
    <h1 class="page-title">Permissions</h1>
    <p class="page-subtitle">Control which roles can access each module</p>
  </div>
  <div class="flex gap-3">
    <a href="#settings/users" class="btn btn--secondary">← Back to users</a>
    <button class="btn btn--primary" id="btn-save-permissions">Save changes</button>
  </div>
</div>

<div class="card" style="padding:0;overflow:hidden">
  <div class="table-wrap" id="permissions-wrap">
    <div style="padding:var(--space-10);text-align:center;color:var(--color-text-muted)">Loading…</div>
  </div>
</div>

<p class="text-muted text-sm mt-4" style="max-width:540px">
  <strong>Access levels:</strong> Write = create + edit; Read = view only; — = no access.
  Owners always have full access and cannot be restricted.
  Changes take effect immediately for the next login.
</p>
