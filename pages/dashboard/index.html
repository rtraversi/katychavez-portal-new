<style>
.dash-section-label {
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--color-text-muted);
  margin-bottom: var(--space-3);
}

.dash-attention-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: var(--space-4);
  margin-bottom: var(--space-6);
}

.dash-card {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  border-top: 3px solid var(--card-accent, var(--color-primary));
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.dash-card-header {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--color-border);
  cursor: pointer;
  user-select: none;
}
.dash-card-header:hover { background: #f8fafc; }

.dash-card-icon { display: flex; align-items: center; color: var(--card-accent); }

.dash-card-title {
  flex: 1;
  font-size: var(--text-sm);
  font-weight: 600;
  color: var(--color-text);
}

.dash-card-count {
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  border-radius: 999px;
  padding: 1px 8px;
  line-height: 18px;
}

.dash-card-body { flex: 1; }

.dash-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: 9px var(--space-4);
  border-bottom: 1px solid var(--color-border);
}
.dash-item:last-of-type { border-bottom: none; }

.dash-item-main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.dash-item-name {
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--color-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dash-item-sub {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dash-badge {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: var(--radius-sm);
}
.dash-badge--danger  { background: var(--color-danger-bg);  color: var(--color-danger); }
.dash-badge--warning { background: var(--color-warning-bg); color: var(--color-warning); }

.dash-time {
  flex-shrink: 0;
  font-size: 11px;
  color: var(--color-text-light);
}

.dash-view-all {
  display: block;
  width: 100%;
  padding: 8px var(--space-4);
  text-align: left;
  font-size: var(--text-xs);
  font-weight: 500;
  color: var(--color-primary);
  background: none;
  border: none;
  border-top: 1px solid var(--color-border);
  cursor: pointer;
  transition: background var(--transition-fast);
}
.dash-view-all:hover { background: var(--color-info-bg); }

.dash-empty {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-4) var(--space-4);
  font-size: var(--text-sm);
  color: var(--color-text-muted);
}

/* Stats row */
.dash-stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: var(--space-4);
}

.dash-stat {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  padding: var(--space-5);
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.dash-stat-value {
  font-size: var(--text-2xl);
  font-weight: 700;
  color: var(--color-text);
  line-height: 1;
}

.dash-stat-label {
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--color-text);
}

.dash-stat-sub {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}
</style>

<div class="page-header">
  <div>
    <h1 class="page-title" id="dash-greeting">Dashboard</h1>
    <p class="page-subtitle" id="dash-date"></p>
  </div>
  <div>
    <button class="btn btn--secondary" id="btn-refresh-dash" style="display:flex;align-items:center;gap:var(--space-2)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Refresh
    </button>
  </div>
</div>

<p class="dash-section-label">Needs Attention</p>
<div class="dash-attention-grid" id="dash-attention-grid">
  <div style="grid-column:1/-1;padding:var(--space-10);text-align:center;color:var(--color-text-muted)">Loading…</div>
</div>

<p class="dash-section-label">At a Glance</p>
<div class="dash-stats-row" id="dash-stats-row">
  <!-- rendered by JS -->
</div>
