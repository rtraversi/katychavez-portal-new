<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>IurisIQ — Portal Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="login-page">

  <div class="login-container" role="main">
    <div class="login-card">

      <header class="login-header">
        <img src="assets/katychavez-logo-small.jpg" class="login-logo" alt="Katy Chavez Law">
        <p class="login-subtitle">Client &amp; Staff Portal</p>
      </header>

      <form id="login-form" class="login-form" method="post" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" required
                 autocomplete="email" inputmode="email"
                 placeholder="you@example.com">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required
                 autocomplete="current-password">
        </div>

        <div id="login-error" class="form-error" role="alert" hidden></div>

        <button type="submit" id="login-btn" class="btn btn--primary btn--full">
          Sign in
        </button>

        <a href="/forgot-password" class="login-forgot">Forgot password?</a>
      </form>

      <!-- TOTP challenge panel (shown after successful password login if MFA enrolled) -->
      <div id="mfa-panel" class="login-form" hidden>
        <p class="reset-intro" style="margin-bottom:var(--space-1,8px)">Open your authenticator app and enter the 6-digit code.</p>
        <div class="field">
          <label for="mfa-code">Verification code</label>
          <input type="text" id="mfa-code" inputmode="numeric" autocomplete="one-time-code"
                 maxlength="6" placeholder="000000" style="letter-spacing:.2em;font-size:1.4rem;text-align:center">
        </div>
        <div id="mfa-error" class="form-error" role="alert" hidden></div>
        <label class="remember-device">
          <input type="checkbox" id="mfa-remember"> Remember this device for 30 days
        </label>
        <button id="mfa-btn" class="btn btn--primary btn--full">Verify</button>
        <a href="#" id="mfa-recovery-link" class="login-forgot">Use a recovery code instead</a>
      </div>

      <!-- Recovery code panel (fallback when TOTP device is unavailable) -->
      <div id="recovery-panel" class="login-form" hidden>
        <p class="reset-intro" style="margin-bottom:var(--space-1,8px)">Enter one of your saved recovery codes. The code will be marked as used.</p>
        <div class="field">
          <label for="recovery-code">Recovery code</label>
          <input type="text" id="recovery-code" autocomplete="off" placeholder="xxxx-xxxx-xxxx"
                 style="font-family:monospace;letter-spacing:.05em">
        </div>
        <div id="recovery-error" class="form-error" role="alert" hidden></div>
        <div id="recovery-message" class="form-success" role="status" hidden></div>
        <button id="recovery-btn" class="btn btn--primary btn--full">Use recovery code</button>
        <a href="#" id="recovery-back-link" class="login-forgot">← Back to verification code</a>
      </div>

    </div>
  </div>

  <div class="powered-by">
    <img src="IurisIQ-Logo-removebg-preview.png" alt="IurisIQ">
    <span>Powered by IurisIQ</span>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.js" integrity="sha384-nD3dwv4+ZqdYnmZKe/249ImlV04om7xTCcsoSeQYI+RO+XlKPoqAWaJR1M5SJH9p" crossorigin="anonymous"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
