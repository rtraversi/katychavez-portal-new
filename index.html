<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>IurisIQ — Portal Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="login-page">

  <div class="login-container" role="main">
    <div class="login-card">

      <header class="login-header">
        <img src="assets/iurisiq-logo.png" class="login-logo" alt="IurisIQ">
        <p class="login-subtitle">Client &amp; Staff Portal</p>
      </header>

      <form id="login-form" class="login-form" method="post" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" required
                 autocomplete="email" inputmode="email"
                 placeholder="you@example.com">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required
                 autocomplete="current-password">
        </div>

        <div id="login-error" class="form-error" role="alert" hidden></div>

        <button type="submit" id="login-btn" class="btn btn--primary btn--full">
          Sign in
        </button>

        <a href="#" id="forgot-link" class="login-forgot">Forgot password?</a>
      </form>

      <!-- Reset password panel (hidden by default) -->
      <div id="reset-panel" class="login-form" hidden>
        <p class="reset-intro">Enter your email and we'll send a reset link.</p>
        <div class="field">
          <label for="reset-email">Email address</label>
          <input type="email" id="reset-email" autocomplete="email">
        </div>
        <div id="reset-message" class="form-success" role="status" hidden></div>
        <div id="reset-error"   class="form-error"   role="alert"  hidden></div>
        <button id="reset-btn" class="btn btn--primary btn--full">Send reset link</button>
        <a href="#" id="back-link" class="login-forgot">← Back to sign in</a>
      </div>

    </div>
  </div>

  <div class="powered-by">
    <img src="IurisIQ-Logo-removebg-preview.png" alt="IurisIQ">
    <span>Powered by IurisIQ</span>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.js" integrity="sha384-nD3dwv4+ZqdYnmZKe/249ImlV04om7xTCcsoSeQYI+RO+XlKPoqAWaJR1M5SJH9p" crossorigin="anonymous"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
